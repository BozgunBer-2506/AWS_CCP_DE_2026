<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS CCP 2026 — Study Guide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(11,15,26,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a2236;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 10;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    header h1 span {
      color: #fbbf24;
    }

    #search {
      flex: 1;
      min-width: 180px;
      padding: 7px 12px;
      background: #131929;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: #fbbf24; box-shadow: 0 0 0 3px rgba(251,191,36,0.1); }
    #search::placeholder { color: #3d4f6b; }

    #count {
      font-size: 12px;
      color: #3d4f6b;
      white-space: nowrap;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    .question-card {
      background: #0f1623;
      border: 1px solid #1a2236;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }

    .question-card:hover {
      border-color: #2a3654;
    }

    .q-num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fbbf24;
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .q-text {
      font-size: 14px;
      line-height: 1.7;
      color: #c8d3e8;
      margin-bottom: 14px;
    }

    .q-answers {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .q-answer {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #fbbf24;
    }

    .q-answer::before {
      content: "✓";
      font-size: 10px;
      opacity: 0.7;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #3d4f6b;
      font-size: 14px;
    }

    #toggle-btn {
      position: fixed;
      bottom: 24px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f1623;
      border: 1px solid #1e2d45;
      border-radius: 999px;
      padding: 8px 16px 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #c8d3e8;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      transition: border-color 0.15s;
      user-select: none;
    }

    #toggle-btn:hover { border-color: #fbbf24; }

    #toggle-btn .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fbbf24;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    body.answers-hidden #toggle-btn .dot { background: #3d4f6b; }

    body.answers-hidden .q-answers { visibility: hidden; }

    footer {
      border-top: 1px solid #1a2236;
      padding: 24px 16px;
      text-align: center;
      font-size: 12px;
      color: #3d4f6b;
      line-height: 1.9;
    }

    footer a {
      color: #fbbf24;
      text-decoration: none;
    }

    footer a:hover {
      color: #fcd34d;
    }
  </style>
</head>
<body>

<header>
  <h1>AWS CCP <span>2026</span></h1>
  <input id="search" type="text" placeholder="Suche nach Frage oder Antwort..." />
  <span id="count"></span>
</header>

<main id="list"></main>

<button id="toggle-btn" onclick="toggleAnswers()">
  <span class="dot"></span>
  <span id="toggle-label">Antworten ausblenden</span>
</button>

<footer>
  <div style="margin-bottom:14px">
    <a href="https://aws.amazon.com/de/certification/certified-cloud-practitioner/" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:10px;background:#1a1a1a;border:1px solid #2d2d2d;border-radius:8px;padding:8px 16px;text-decoration:none;">
      <svg width="38" height="23" viewBox="0 0 80 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.4 32.6c-3.7 2.7-9.1 4.2-13.8 4.2-6.5 0-12.4-2.4-16.8-6.4-.3-.3 0-.7.4-.5 4.8 2.8 10.7 4.4 16.8 4.4 4.1 0 8.7-.9 12.8-2.6.6-.3 1.1.4.6.9z" fill="#FF9900"/>
        <path d="M24 30.8c-.5-.6-3.2-.3-4.4-.1-.4.1-.4-.3-.1-.5 2.2-1.5 5.7-1.1 6.1-.6.4.5-.1 4.1-2.1 5.8-.3.3-.6.1-.5-.2.5-1.1 1.5-3.8 1-4.4z" fill="#FF9900"/>
        <path d="M19.8 10.2V8.5c0-.3.2-.4.4-.4h7.3c.2 0 .4.2.4.4v1.5c0 .2-.2.5-.5.9l-3.8 5.4c1.4 0 2.9.2 4.2.9.3.2.3.4.3.6v1.8c0 .2-.3.5-.5.3-2.1-1.1-4.9-1.2-7.2 0-.2.1-.5-.1-.5-.3v-1.7c0-.2 0-.5.3-.9l4.4-6.3h-3.8c-.2 0-.4-.2-.4-.5z" fill="#232F3E"/>
        <path d="M7 18.9H5.1c-.2 0-.4-.2-.4-.4V8.5c0-.2.2-.4.4-.4H7c.2 0 .4.2.4.4v1.3c.5-1.3 1.4-1.9 2.6-1.9 1.2 0 2 .6 2.6 1.9.5-1.3 1.6-1.9 2.8-1.9.8 0 1.7.3 2.3 1 .6.8.5 1.9.5 2.8v6.8c0 .2-.2.4-.4.4h-1.9c-.2 0-.4-.2-.4-.4v-5.7c0-.4 0-1.3-.1-1.6-.1-.6-.5-.7-.9-.7-.4 0-.8.2-1 .7-.2.5-.1 1.2-.1 1.6v5.7c0 .2-.2.4-.4.4H11c-.2 0-.4-.2-.4-.4v-5.7c0-1.2.2-2.9-1-2.9-1.3 0-1.2 1.7-1.2 2.9v5.7c0 .2-.2.4-.4.4z" fill="#232F3E"/>
        <path d="M32.6 7.9c2.6 0 4 2.2 4 5.1 0 2.8-1.6 5-4 5-2.5 0-3.9-2.2-3.9-5 0-2.9 1.4-5.1 3.9-5.1zm0 1.9c-1.3 0-1.4 1.7-1.4 2.8 0 1.1 0 3.4 1.4 3.4 1.3 0 1.4-1.8 1.4-2.9 0-.7 0-1.6-.3-2.2-.2-.6-.6-.9-1.1-1.1z" fill="#232F3E"/>

      </svg>
      <span style="color:#e2e8f0;font-size:12px;font-weight:600;">Zur offiziellen Prüfungsanmeldung →</span>
    </a>
  </div>
  <div>Die Prüfungsfragen und -inhalte stammen aus den Übungsprüfungen von <a href="https://www.syntax-institut.de/" target="_blank" rel="noopener"><strong>syntaxinstitut</strong></a>.</div>
  <div>Fehler gefunden? <a href="https://github.com/BozgunBer-2506/AWS_CCP_DE_2026/issues" target="_blank" rel="noopener">GitHub Issues</a> öffnen.</div>
  <div style="margin-top:8px">
    <a href="https://thebozgun.com" target="_blank" rel="noopener">thebozgun.com</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/BozgunBer-2506" target="_blank" rel="noopener">GitHub</a>
  </div>
</footer>

<script>
  let allQuestions = [];

  async function load() {
    const res = await fetch("./questions.json");
    allQuestions = await res.json();
    render(allQuestions);
    // Restore scroll position after render
    const saved = sessionStorage.getItem("scrollY");
    if (saved) window.scrollTo(0, parseInt(saved, 10));
  }

  function render(questions) {
    const list = document.getElementById("list");
    const count = document.getElementById("count");
    count.textContent = questions.length + " Fragen";

    if (questions.length === 0) {
      list.innerHTML = '<div class="no-results">Keine Ergebnisse gefunden.</div>';
      return;
    }

    list.innerHTML = questions.map((q, i) => {
      const answers = Array.isArray(q.correct) ? q.correct : [q.correct];
      const badges = answers.map(a => `<div class="q-answer">${escHtml(a)}</div>`).join("");
      return `
        <div class="question-card">
          <div class="q-num">Frage ${i + 1}</div>
          <div class="q-text">${escHtml(q.question)}</div>
          <div class="q-answers">${badges}</div>
        </div>
      `;
    }).join("");
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function toggleAnswers() {
    const hidden = document.body.classList.toggle("answers-hidden");
    document.getElementById("toggle-label").textContent =
      hidden ? "Antworten anzeigen" : "Antworten ausblenden";
    sessionStorage.setItem("answersHidden", hidden ? "1" : "");
  }

  // Restore toggle state
  if (sessionStorage.getItem("answersHidden") === "1") {
    document.body.classList.add("answers-hidden");
    document.getElementById("toggle-label").textContent = "Antworten anzeigen";
  }

  // Save scroll position continuously
  window.addEventListener("scroll", function() {
    sessionStorage.setItem("scrollY", window.scrollY);
  }, { passive: true });

  document.getElementById("search").addEventListener("input", function() {
    const q = this.value.toLowerCase();
    if (!q) { render(allQuestions); return; }
    render(allQuestions.filter(item => {
      const answers = Array.isArray(item.correct) ? item.correct : [item.correct];
      return item.question.toLowerCase().includes(q) ||
        answers.some(a => a.toLowerCase().includes(q));
    }));
  });

  load();
</script>

</body>
</html>
