<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS CCP 2026 — Study Guide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b0f1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(11,15,26,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a2236;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 10;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    header h1 span {
      color: #818cf8;
    }

    #search {
      flex: 1;
      min-width: 180px;
      padding: 7px 12px;
      background: #131929;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129,140,248,0.1); }
    #search::placeholder { color: #3d4f6b; }

    #count {
      font-size: 12px;
      color: #3d4f6b;
      white-space: nowrap;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    .question-card {
      background: #0f1623;
      border: 1px solid #1a2236;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }

    .question-card:hover {
      border-color: #2a3654;
    }

    .q-num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #818cf8;
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .q-text {
      font-size: 14px;
      line-height: 1.7;
      color: #c8d3e8;
      margin-bottom: 14px;
    }

    .q-answers {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .q-answer {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0a1f12;
      border: 1px solid #1a4a2e;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 500;
      color: #6ee7b7;
    }

    .q-answer::before {
      content: "✓";
      font-size: 10px;
      opacity: 0.7;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #3d4f6b;
      font-size: 14px;
    }

    #toggle-btn {
      position: fixed;
      bottom: 24px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f1623;
      border: 1px solid #1e2d45;
      border-radius: 999px;
      padding: 8px 16px 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #c8d3e8;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      transition: border-color 0.15s;
      user-select: none;
    }

    #toggle-btn:hover { border-color: #818cf8; }

    #toggle-btn .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6ee7b7;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    body.answers-hidden #toggle-btn .dot { background: #3d4f6b; }

    body.answers-hidden .q-answers { visibility: hidden; }

    footer {
      border-top: 1px solid #1a2236;
      padding: 24px 16px;
      text-align: center;
      font-size: 12px;
      color: #3d4f6b;
      line-height: 1.9;
    }

    footer a {
      color: #818cf8;
      text-decoration: none;
    }

    footer a:hover {
      color: #a5b4fc;
    }
  </style>
</head>
<body>

<header>
  <h1>AWS CCP <span>2026</span></h1>
  <input id="search" type="text" placeholder="Suche nach Frage oder Antwort..." />
  <span id="count"></span>
</header>

<main id="list"></main>

<button id="toggle-btn" onclick="toggleAnswers()">
  <span class="dot"></span>
  <span id="toggle-label">Antworten ausblenden</span>
</button>

<footer>
  <div>Die Prüfungsfragen und -inhalte stammen aus den Übungsprüfungen von <strong>syntax.de</strong>.</div>
  <div>Bei Fehlern oder Anmerkungen bitte melden: <a href="mailto:contact@thebozgun.com">contact@thebozgun.com</a></div>
  <div style="margin-top:8px">
    <a href="https://thebozgun.com" target="_blank" rel="noopener">thebozgun.com</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/BozgunBer-2506" target="_blank" rel="noopener">GitHub</a>
  </div>
</footer>

<script>
  let allQuestions = [];

  async function load() {
    const res = await fetch("./questions.json");
    allQuestions = await res.json();
    render(allQuestions);
    // Restore scroll position after render
    const saved = sessionStorage.getItem("scrollY");
    if (saved) window.scrollTo(0, parseInt(saved, 10));
  }

  function render(questions) {
    const list = document.getElementById("list");
    const count = document.getElementById("count");
    count.textContent = questions.length + " Fragen";

    if (questions.length === 0) {
      list.innerHTML = '<div class="no-results">Keine Ergebnisse gefunden.</div>';
      return;
    }

    list.innerHTML = questions.map((q, i) => {
      const answers = Array.isArray(q.correct) ? q.correct : [q.correct];
      const badges = answers.map(a => `<div class="q-answer">${escHtml(a)}</div>`).join("");
      return `
        <div class="question-card">
          <div class="q-num">Frage ${i + 1}</div>
          <div class="q-text">${escHtml(q.question)}</div>
          <div class="q-answers">${badges}</div>
        </div>
      `;
    }).join("");
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function toggleAnswers() {
    const hidden = document.body.classList.toggle("answers-hidden");
    document.getElementById("toggle-label").textContent =
      hidden ? "Antworten anzeigen" : "Antworten ausblenden";
    sessionStorage.setItem("answersHidden", hidden ? "1" : "");
  }

  // Restore toggle state
  if (sessionStorage.getItem("answersHidden") === "1") {
    document.body.classList.add("answers-hidden");
    document.getElementById("toggle-label").textContent = "Antworten anzeigen";
  }

  // Save scroll position continuously
  window.addEventListener("scroll", function() {
    sessionStorage.setItem("scrollY", window.scrollY);
  }, { passive: true });

  document.getElementById("search").addEventListener("input", function() {
    const q = this.value.toLowerCase();
    if (!q) { render(allQuestions); return; }
    render(allQuestions.filter(item => {
      const answers = Array.isArray(item.correct) ? item.correct : [item.correct];
      return item.question.toLowerCase().includes(q) ||
        answers.some(a => a.toLowerCase().includes(q));
    }));
  });

  load();
</script>

</body>
</html>
